apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: workengine-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - workengine.enterprise.ai
    secretName: workengine-tls
  rules:
  - host: workengine.enterprise.ai
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: workengine-core-svc
            port:
              number: 80
      - path: /
        pathType: Prefix
        backend:
          service:
            name: workengine-dashboard-svc
            port:
              number: 80
